name: Publish

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

"on":
  push:
    branches:
      - main
    paths:
      - .speakeasy/gen.lock
  workflow_dispatch: {}

jobs:
  publish:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: textql
    secrets:
      github_access_token: ${{ secrets.GH_PAT }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  sync-typescript-sdk-docs:
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Generate docs dispatch bot token
        id: docs-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SDK_DISPATCH_APP_ID }}
          private-key: ${{ secrets.SDK_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: demo2
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout TypeScript SDK
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout TextQL docs
        uses: actions/checkout@v4
        with:
          repository: TextQLLabs/demo2
          token: ${{ steps.docs-app-token.outputs.token }}
          path: demo2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Snapshot combined OpenAPI with SDK samples
        run: |
          curl --fail --silent --show-error --location \
            --header 'Cache-Control: no-cache' \
            --retry 10 --retry-all-errors --retry-delay 10 \
            https://spec.speakeasy.com/textql/home/textql-api-with-code-samples \
            --output demo2/docs/public/api-reference/speakeasy/textql-api-with-code-samples.yaml

      - name: Install Speakeasy CLI
        env:
          SPEAKEASY_VERSION: 1.790.3
        run: |
          export VERSION="$SPEAKEASY_VERSION"
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/speakeasy-api/speakeasy/v1.790.3/install.sh \
            --output "$RUNNER_TEMP/speakeasy-install.sh"
          sh "$RUNNER_TEMP/speakeasy-install.sh"

      - name: Merge TypeScript SDK code samples
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
        run: |
          set -euo pipefail
          samples_dir="$RUNNER_TEMP/typescript-code-samples"
          merged_spec="$RUNNER_TEMP/textql-api-with-typescript-code-samples.yaml"
          spec="demo2/docs/public/api-reference/speakeasy/textql-api-with-code-samples.yaml"
          mkdir -p "$samples_dir"
          speakeasy pull \
            --spec textql-api-typescript-code-samples \
            --revision latest \
            --output-dir "$samples_dir"
          if grep -q 'label: TypeScript (SDK)' "$spec"; then
            echo "Combined snapshot already contains TypeScript SDK samples."
          else
            speakeasy overlay apply \
              --strict \
              --schema "$spec" \
              --overlay "$samples_dir/overlay.yaml" \
              --out "$merged_spec"
            mv "$merged_spec" "$spec"
          fi

      - name: Render Mintlify API reference
        run: |
          python3 -m pip install --disable-pip-version-check PyYAML==6.0.3
          python3 demo2/scripts/render_sdk_api_reference.py

      - name: Render Mintlify release log
        run: |
          python3 sdk/scripts/render_mintlify_releases.py \
            sdk/RELEASES.md \
            demo2/docs/public/api-reference/sdk/typescript.mdx

      - name: Create or update docs pull request
        id: docs-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.docs-app-token.outputs.token }}
          path: demo2
          branch: automation/typescript-sdk-docs
          delete-branch: true
          commit-message: "docs: sync TypeScript SDK reference"
          title: "docs: sync TypeScript SDK reference"
          body: |
            Automated after a successful TypeScript SDK publish.

            - Snapshots the combined Speakeasy OpenAPI document and SDK code samples.
            - Regenerates stable Mintlify API-reference wrappers and navigation.
            - Updates the TypeScript SDK release log from `TextQLLabs/textql-ts-sdk/RELEASES.md`.

      - name: Auto-merge docs pull request after checks pass
        if: steps.docs-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.docs-app-token.outputs.token }}
          DOCS_PR_NUMBER: ${{ steps.docs-pr.outputs.pull-request-number }}
        run: |
          gh pr merge "$DOCS_PR_NUMBER" \
            --repo TextQLLabs/demo2 \
            --auto \
            --squash
