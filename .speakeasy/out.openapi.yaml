          $ref: '#/components/schemas/google.protobuf.Timestamp'
        endedAt:
          title: ended_at
          description: unset while running
          nullable: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        durationMs:
          type:
            - integer
            - string
          title: duration_ms
          format: int64
        acus:
