    textql.rpc.public.patches.SaveAllObjectsAsConfigRequest:
      type: object
      properties:
        objectType:
          type: string
          title: object_type
      title: SaveAllObjectsAsConfigRequest
      additionalProperties: false
      description: |-
        SaveAllObjectsAsConfig is the bulk SaveObjectAsConfig: it renders every
         object of the type the caller can read (and that has no config history) into
         ONE open patch. Objects the config format cannot express are skipped with a
         per-object reason rather than failing the batch.
    textql.rpc.public.patches.SaveAllObjectsAsConfigResponse:
      type: object
      properties:
        patch:
          title: patch
          $ref: '#/components/schemas/textql.rpc.public.patches.Patch'
        filePaths:
          type: array
          items:
            type: string
          title: file_paths
          description: Library-relative paths of the config files in the patch.
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/textql.rpc.public.patches.SkippedConfigExport'
          title: skipped
        alreadyManagedCount:
          type: integer
          title: already_managed_count
          format: int32
          description: Objects excluded up front because a config file already manages them.
      title: SaveAllObjectsAsConfigResponse
      additionalProperties: false
    textql.rpc.public.patches.SaveObjectAsConfigRequest:
      type: object
      properties:
        objectType:
          type: string
          title: object_type
        objectId:
          type: string
          title: object_id
      title: SaveObjectAsConfigRequest
      additionalProperties: false
      description: |-
        SaveObjectAsConfig renders an existing DB object (object_type keyed like
         config_source: "playbook", later "dashboard", ...) as a config file and
         authors it as a new OPEN patch under the type's default library folder. The
         file can be moved/edited like any patch file before merging; on merge,
         reconcile takes over the original object when content and permissions allow.
    textql.rpc.public.patches.SaveObjectAsConfigResponse:
      type: object
      properties:
        patch:
          title: patch
          $ref: '#/components/schemas/textql.rpc.public.patches.Patch'
        filePath:
          type: string
          title: file_path
          description: Library-relative path the config file was placed at.
      title: SaveObjectAsConfigResponse
      additionalProperties: false
