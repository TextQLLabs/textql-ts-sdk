          type: integer
          title: total_files
          format: int32
        pulledFiles:
          type: integer
          title: pulled_files
          format: int32
        deadFiles:
          type: integer
          title: dead_files
          format: int32
        avgHitRate:
          type: number
          title: avg_hit_rate
          format: float
          description: 0..1, averaged over pulled files
        errorFiles:
          type: integer
          title: error_files
          format: int32
          description: files with at least one errored pull in the window
        reclaimableTokens:
          type:
            - integer
            - string
          title: reclaimable_tokens
          format: int64
          description: estimated tokens held by dead files (~size/4)
      title: GetOntologyUsageSummaryResponse
      additionalProperties: false
      description: |-
        Aggregate ontology-usage health for the window — the roll-ups the Ontology
         Health hero needs without paging every file to the client. pulled_files,
         avg_hit_rate, and error_files are Postgres aggregates over the pull/run data;
         total_files, dead_files, and reclaimable_tokens come from the current git
         tree diffed against the set of pulled paths (a dead file is one present in
         the ontology but never pulled in the window).
