          type: boolean
          title: shared_with_me
          nullable: true
        excludeFeed:
          type: boolean
          title: exclude_feed
          nullable: true
        sources:
          type: array
          items:
            $ref: '#/components/schemas/textql.rpc.public.chat.ChatSource'
          title: sources
          description: Filter chats by source (union). Ignored when empty. Supersedes the single `source` when non-empty.
