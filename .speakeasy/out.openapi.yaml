        One billable lease interval: the worker was held from started_at to ended_at
         (or now, while still running). acus = duration_hours × acus_per_hour. This is
         compute usage derived from lease durations, not the invoiced dollar amount,
         and excludes warm-window idle billing handled by the console ledger.
