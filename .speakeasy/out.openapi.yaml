          title: tag_count
          format: int64
        updatedAt:
          title: updated_at
          description: |-
            Last write to the topic row; with backfill_status='running' this is the
             scan start, letting the FE render long-stale runs as failed.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
