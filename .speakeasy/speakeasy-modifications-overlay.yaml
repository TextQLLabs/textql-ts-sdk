overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Speakeasy Modifications
  version: 0.0.2
  x-speakeasy-metadata:
    after: ""
    before: ""
    type: speakeasy-modifications
actions:
  - target: $["components"]["schemas"]["connect-protocol-version"]
    update:
      default: 1
  - target: $["paths"]["/textql.rpc.public.chat.ChatService/StreamChat"]
    remove: true
  - target: $["paths"]["/textql.rpc.public.chat.ChatService/WatchChat"]
    remove: true
  - target: $["paths"]["/textql.rpc.public.agent.AgentService/StreamAgentStatus"]
    remove: true
  - target: $["paths"]["/textql.rpc.public.dashboard.DashboardService/WatchDashboardHealth"]
    remove: true
  - target: $["paths"]["/textql.rpc.public.playbook.PlaybookService/StreamTemplateDataStatus"]
    remove: true
  - target: $["components"]
    update:
      securitySchemes:
        apiKey:
          type: apiKey
          in: header
          name: tql_api_key
  # Clear any existing top-level security before setting exactly one entry.
  # Speakeasy pushes the overlaid spec back to the registry, so a plain add
  # would compound (security: [apiKey, apiKey]) on the next run and break the
  # hoisted api_key constructor arg. remove-then-add keeps it idempotent.
  - target: $["security"]
    remove: true
  - target: $
    update:
      security:
        - apiKey: []
  - target: $["paths"]["/textql.rpc.public.patches.LibraryService/RemoveLibrarySubmodule"]["post"]
